exp:
  seed: 1234
  out_dir: outputs/decoder16k_ft

model:
  pretrained_dir: pretrained_models/SparkTTS-0.5B
  device: cuda

  train:
    decoder_only: true
    prenet_postnet: false

  init:
    reuse_16k_decoder_weights: true

  decoder_override:
    enabled: false
    rates: [8, 5, 4, 2]
    kernel_sizes: null

data:
  train_manifest: data/train.jsonl
  val_manifest: data/val.jsonl

  fps: 50
  target_sample_rate: 16000
  encoder_sample_rate: 16000

  segment_seconds: 2.56
  ref_seconds: 3.00
  align_to_frames: true

  cache:
    enabled: false
    dir: cache/train
    cache_dvector: false

  val_cache:
    enabled: false
    dir: cache/val
    cache_dvector: false

train:
  batch_size: 8
  val_batch_size: 8
  num_workers: 4

  devices: 1
  precision: 16-mixed
  max_steps: 100000
  grad_accum: 1
  clip_grad: 1.0

  log_every_n_steps: 50
  val_every_n_steps: 2000
  save_every_n_steps: 5000

  lr: 2.0e-4
  weight_decay: 0.0
  betas: [0.8, 0.99]
  lr_disc: 2.0e-4
  betas_disc: [0.8, 0.99]

loss:
  use_gan: false

  wave_l1_weight: 1.0
  mel_weight: 45.0
  stft_weight: 1.0

  mel:
    n_fft: 1024
    hop_length: 160   # ~10ms at 16k
    win_length: 1024
    n_mels: 80
    f_min: 0.0
    f_max: 8000.0

  stft:
    configs:
      - {fft_size: 1024, hop_size: 160, win_length: 1024}
      - {fft_size: 2048, hop_size: 320, win_length: 2048}
      - {fft_size: 512,  hop_size: 80,  win_length: 512}

  gan:
    adv_weight: 1.0
    fm_weight: 2.0
